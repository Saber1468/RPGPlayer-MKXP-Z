workflows:
  ios-mkxpz:
    name: MKXP-Z iOS Build
    instance_type: mac_mini_m2
    cache:
      cache_paths:
        - $CM_BUILD_DIR/deps/ios_dist
    scripts:
      - name: Install Build Tools
        script: |
          brew install cmake pkg-config nasm freetype

      - name: Build iOS Dependencies
        script: |
          set -e

          IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          MIN_IOS="13.0"
          ARCH="arm64"
          NCPU=$(sysctl -n hw.ncpu)

          DEPS_DIR="$CM_BUILD_DIR/deps/ios_dist"
          XCFW_DIR="$DEPS_DIR/xcframeworks"
          BUILD_DIR="$CM_BUILD_DIR/deps_build"
          TOOLCHAIN="$CM_BUILD_DIR/ios.toolchain.cmake"

          mkdir -p "$DEPS_DIR/include" "$DEPS_DIR/lib/device" "$XCFW_DIR" "$BUILD_DIR"

          if [ -f "$DEPS_DIR/lib/device/libruby.a" ]; then
            echo ">>> Deps already cached, skipping build"
            exit 0
          fi

          # Write iOS toolchain file — CMAKE_POLICY_VERSION_MINIMUM=3.5 handles
          # old CMakeLists.txt files (libogg, libvorbis, physfs etc) that declare
          # cmake_minimum_required < 3.5 which newer CMake now rejects outright
          printf '%s\n' \
            'cmake_minimum_required(VERSION 3.15)' \
            'set(CMAKE_SYSTEM_NAME iOS)' \
            'set(CMAKE_OSX_ARCHITECTURES "arm64")' \
            'set(CMAKE_OSX_DEPLOYMENT_TARGET "13.0")' \
            'execute_process(COMMAND xcrun --sdk iphoneos --show-sdk-path' \
            '  OUTPUT_VARIABLE CMAKE_OSX_SYSROOT OUTPUT_STRIP_TRAILING_WHITESPACE)' \
            'set(CMAKE_TRY_COMPILE_TARGET_TYPE STATIC_LIBRARY)' \
            'set(CMAKE_POLICY_VERSION_MINIMUM 3.5)' \
            > "$TOOLCHAIN"

          # Base cmake flags reused by every library
          CMAKE_IOS="-DCMAKE_TOOLCHAIN_FILE=$TOOLCHAIN \
            -DCMAKE_INSTALL_PREFIX=$DEPS_DIR \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5"

          # Wrap a .a into a minimal xcframework the CMakeLists.txt expects
          make_xcfw() {
            NAME=$1
            LIB=$2
            XCFW="$XCFW_DIR/${NAME}.xcframework"
            mkdir -p "$XCFW/ios-arm64"
            cp "$LIB" "$XCFW/ios-arm64/${NAME}.a"
            printf '%s\n' \
              '<?xml version="1.0" encoding="UTF-8"?>' \
              '<plist version="1.0"><dict>' \
              '<key>AvailableLibraries</key><array><dict>' \
              '<key>LibraryIdentifier</key><string>ios-arm64</string>' \
              "<key>LibraryPath</key><string>${NAME}.a</string>" \
              '<key>SupportedArchitectures</key><array><string>arm64</string></array>' \
              '<key>SupportedPlatform</key><string>ios</string>' \
              '</dict></array>' \
              '<key>CFBundlePackageType</key><string>XFWK</string>' \
              '<key>XCFrameworkFormatVersion</key><string>1.0</string>' \
              '</dict></plist>' \
              > "$XCFW/Info.plist"
          }

          cd "$BUILD_DIR"

          # ── 1. libogg ──────────────────────────────────────────────────────────
          # FIX: -DCMAKE_POLICY_VERSION_MINIMUM=3.5 stops new CMake rejecting old
          #      cmake_minimum_required(VERSION 2.x) in libogg's CMakeLists.txt
          echo ">>> Building libogg"
          curl -fsSL https://downloads.xiph.org/releases/ogg/libogg-1.3.5.tar.gz | tar xz
          cmake -S libogg-1.3.5 -B libogg-build \
            $CMAKE_IOS \
            -DINSTALL_DOCS=OFF
          cmake --build libogg-build --parallel $NCPU
          cmake --install libogg-build
          make_xcfw "ogg" "$DEPS_DIR/lib/libogg.a"

          # ── 2. libvorbis ───────────────────────────────────────────────────────
          # FIX: same old cmake_minimum_required issue, same fix
          # FIX: explicitly point at our built libogg so it doesn't grab system one
          echo ">>> Building libvorbis"
          curl -fsSL https://downloads.xiph.org/releases/vorbis/libvorbis-1.3.7.tar.gz | tar xz
          cmake -S libvorbis-1.3.7 -B libvorbis-build \
            $CMAKE_IOS \
            -DOGG_INCLUDE_DIR="$DEPS_DIR/include" \
            -DOGG_LIBRARY="$DEPS_DIR/lib/libogg.a"
          cmake --build libvorbis-build --parallel $NCPU
          cmake --install libvorbis-build
          make_xcfw "vorbis"     "$DEPS_DIR/lib/libvorbis.a"
          make_xcfw "vorbisfile" "$DEPS_DIR/lib/libvorbisfile.a"

          # ── 3. libtheora ───────────────────────────────────────────────────────
          # FIX: libtheora has no CMakeLists so we write a minimal one
          # FIX: only compile decoder files — encoder requires neon asm on iOS
          # FIX: absolute paths used so cmake -S works from any directory
          echo ">>> Building libtheora"
          curl -fsSL https://downloads.xiph.org/releases/theora/libtheora-1.1.1.tar.gz | tar xz
          THEORA_SRC="$BUILD_DIR/libtheora-1.1.1"
          mkdir -p theora-cmake
          printf '%s\n' \
            'cmake_minimum_required(VERSION 3.15)' \
            'project(theora C)' \
            "set(THEORA_ROOT \"$THEORA_SRC\")" \
            'set(DEC_SRCS' \
            '  ${THEORA_ROOT}/lib/apiwrapper.c' \
            '  ${THEORA_ROOT}/lib/bitpack.c' \
            '  ${THEORA_ROOT}/lib/decapiwrapper.c' \
            '  ${THEORA_ROOT}/lib/decinfo.c' \
            '  ${THEORA_ROOT}/lib/decode.c' \
            '  ${THEORA_ROOT}/lib/dequant.c' \
            '  ${THEORA_ROOT}/lib/fragment.c' \
            '  ${THEORA_ROOT}/lib/huffdec.c' \
            '  ${THEORA_ROOT}/lib/idct.c' \
            '  ${THEORA_ROOT}/lib/info.c' \
            '  ${THEORA_ROOT}/lib/internal.c' \
            '  ${THEORA_ROOT}/lib/quant.c' \
            '  ${THEORA_ROOT}/lib/state.c' \
            ')' \
            "set(OGG_INC \"$DEPS_DIR/include\")" \
            'add_library(theoradec STATIC ${DEC_SRCS})' \
            'target_include_directories(theoradec PUBLIC ${THEORA_ROOT}/include PRIVATE ${OGG_INC})' \
            'add_library(theora STATIC ${DEC_SRCS})' \
            'target_include_directories(theora PUBLIC ${THEORA_ROOT}/include PRIVATE ${OGG_INC})' \
            'install(TARGETS theora theoradec ARCHIVE DESTINATION lib)' \
            'install(DIRECTORY ${THEORA_ROOT}/include/theora DESTINATION include)' \
            > theora-cmake/CMakeLists.txt
          cmake -S theora-cmake -B theora-build $CMAKE_IOS
          cmake --build theora-build --parallel $NCPU
          cmake --install theora-build
          make_xcfw "theora"    "$DEPS_DIR/lib/libtheora.a"
          make_xcfw "theoradec" "$DEPS_DIR/lib/libtheoradec.a"

          # ── 4. uchardet ────────────────────────────────────────────────────────
          echo ">>> Building uchardet"
          curl -fsSL https://www.freedesktop.org/software/uchardet/releases/uchardet-0.0.8.tar.xz | tar xJ
          cmake -S uchardet-0.0.8 -B uchardet-build \
            $CMAKE_IOS \
            -DBUILD_BINARY=OFF
          cmake --build uchardet-build --parallel $NCPU
          cmake --install uchardet-build
          # FIX: ensure uchardet.h ends up where encoding.h looks for it
          mkdir -p "$DEPS_DIR/include/uchardet"
          find uchardet-0.0.8 -name "uchardet.h" -exec cp {} "$DEPS_DIR/include/uchardet/" \;
          make_xcfw "uchardet" "$DEPS_DIR/lib/libuchardet.a"

          # ── 5. pixman ──────────────────────────────────────────────────────────
          # FIX: write our own CMakeLists — pixman's build system is meson only
          # FIX: explicitly exclude SIMD files that won't compile on iOS arm64
          #      without special compiler flags (mmx/sse2/vmx/neon assembly)
          echo ">>> Building pixman"
          curl -fsSL https://cairographics.org/releases/pixman-0.42.2.tar.gz | tar xz
          PIXMAN_SRC="$BUILD_DIR/pixman-0.42.2"
          mkdir -p pixman-cmake
          printf '%s\n' \
            'cmake_minimum_required(VERSION 3.15)' \
            'project(pixman C)' \
            "set(PIXMAN_ROOT \"$PIXMAN_SRC\")" \
            'file(GLOB ALL_SRC "${PIXMAN_ROOT}/pixman/pixman*.c")' \
            'set(EXCLUDE_PAT "mmx|sse2|ssse3|vmx|arm-neon|arm-simd|mips|loongson|x86")' \
            'foreach(F ${ALL_SRC})' \
            '  if(NOT F MATCHES "${EXCLUDE_PAT}")' \
            '    list(APPEND PIXMAN_SRC_FILES ${F})' \
            '  endif()' \
            'endforeach()' \
            'add_library(pixman-1 STATIC ${PIXMAN_SRC_FILES})' \
            'target_include_directories(pixman-1 PUBLIC ${PIXMAN_ROOT}/pixman)' \
            'target_compile_definitions(pixman-1 PRIVATE' \
            '  PACKAGE="pixman" PACKAGE_VERSION="0.42.2"' \
            '  PIXMAN_NO_TLS=1 HAVE_SIGACTION=1 HAVE_ALARM=1' \
            ')' \
            'install(TARGETS pixman-1 ARCHIVE DESTINATION lib)' \
            'install(FILES ${PIXMAN_ROOT}/pixman/pixman.h DESTINATION include/pixman-1)' \
            > pixman-cmake/CMakeLists.txt
          cmake -S pixman-cmake -B pixman-build $CMAKE_IOS
          cmake --build pixman-build --parallel $NCPU
          cmake --install pixman-build
          make_xcfw "pixman" "$DEPS_DIR/lib/libpixman-1.a"

          # ── 6. PhysFS ──────────────────────────────────────────────────────────
          echo ">>> Building PhysFS"
          curl -fsSL https://icculus.org/physfs/downloads/physfs-3.0.2.tar.bz2 | tar xj
          cmake -S physfs-3.0.2 -B physfs-build \
            $CMAKE_IOS \
            -DPHYSFS_BUILD_SHARED=OFF \
            -DPHYSFS_BUILD_TEST=OFF \
            -DPHYSFS_ARCHIVE_ZIP=ON
          cmake --build physfs-build --parallel $NCPU
          cmake --install physfs-build
          make_xcfw "physfs" "$DEPS_DIR/lib/libphysfs.a"

          # ── 7. OpenAL-soft ─────────────────────────────────────────────────────
          # FIX: disable all non-CoreAudio backends explicitly to avoid link errors
          # FIX: ALSOFT_OSX_FRAMEWORK=OFF prevents it building a .framework instead of .a
          echo ">>> Building OpenAL-soft"
          curl -fsSL https://github.com/kcat/openal-soft/archive/refs/tags/1.23.1.tar.gz | tar xz
          cmake -S openal-soft-1.23.1 -B openal-build \
            $CMAKE_IOS \
            -DLIBTYPE=STATIC \
            -DALSOFT_UTILS=OFF \
            -DALSOFT_EXAMPLES=OFF \
            -DALSOFT_TESTS=OFF \
            -DALSOFT_BACKEND_COREAUDIO=ON \
            -DALSOFT_BACKEND_WAVE=OFF \
            -DALSOFT_BACKEND_OSS=OFF \
            -DALSOFT_BACKEND_ALSA=OFF \
            -DALSOFT_BACKEND_PULSEAUDIO=OFF \
            -DALSOFT_OSX_FRAMEWORK=OFF
          cmake --build openal-build --parallel $NCPU
          cmake --install openal-build
          # FIX: openal-soft may install as libopenal or libOpenAL — find either
          OPENAL_LIB=$(find "$DEPS_DIR/lib" \( -name "libopenal*.a" -o -name "libOpenAL*.a" \) 2>/dev/null | head -1)
          echo "OpenAL lib found: $OPENAL_LIB"
          make_xcfw "openal" "$OPENAL_LIB"

          # ── 8. sigc++ ──────────────────────────────────────────────────────────
          # FIX: sigc++ 2.12 uses meson — write our own minimal CMakeLists
          # FIX: use GLOB_RECURSE carefully — only grab .cc not .h config files
          echo ">>> Building sigc++"
          curl -fsSL https://download.gnome.org/sources/libsigc++/2.12/libsigc++-2.12.0.tar.xz | tar xJ
          SIGC_SRC="$BUILD_DIR/libsigc++-2.12.0"
          mkdir -p sigc-cmake
          printf '%s\n' \
            'cmake_minimum_required(VERSION 3.15)' \
            'project(sigc CXX)' \
            'set(CMAKE_CXX_STANDARD 14)' \
            "set(SIGC_ROOT \"$SIGC_SRC\")" \
            'file(GLOB_RECURSE SRC "${SIGC_ROOT}/sigc++/*.cc")' \
            'add_library(sigc-2.0 STATIC ${SRC})' \
            'target_include_directories(sigc-2.0 PUBLIC ${SIGC_ROOT})' \
            'install(TARGETS sigc-2.0 ARCHIVE DESTINATION lib)' \
            'install(DIRECTORY ${SIGC_ROOT}/sigc++ DESTINATION include/sigc++-2.0' \
            '  FILES_MATCHING PATTERN "*.h")' \
            > sigc-cmake/CMakeLists.txt
          cmake -S sigc-cmake -B sigc-build $CMAKE_IOS
          cmake --build sigc-build --parallel $NCPU
          cmake --install sigc-build
          make_xcfw "sigc" "$DEPS_DIR/lib/libsigc-2.0.a"

          # ── 9. SDL2 ────────────────────────────────────────────────────────────
          # FIX: disable OpenGL (desktop) — iOS uses OpenGLES only
          # FIX: disable audio backends that don't exist on iOS
          echo ">>> Building SDL2"
          curl -fsSL https://github.com/libsdl-org/SDL/releases/download/release-2.30.3/SDL2-2.30.3.tar.gz | tar xz
          cmake -S SDL2-2.30.3 -B SDL2-build \
            $CMAKE_IOS \
            -DSDL_STATIC=ON \
            -DSDL_SHARED=OFF \
            -DSDL_TEST=OFF \
            -DSDL_VIDEO_OPENGL=OFF \
            -DSDL_VIDEO_OPENGLES=ON \
            -DSDL_RENDER_METAL=ON \
            -DSDL_AUDIO=ON \
            -DSDL_JOYSTICK=ON \
            -DSDL_HAPTIC=ON \
            -DSDL_SENSOR=ON
          cmake --build SDL2-build --parallel $NCPU
          cmake --install SDL2-build
          # FIX: SDL2 on iOS installs as libSDL2.a or libSDL2-static.a
          SDL2_LIB=$(find "$DEPS_DIR/lib" -name "libSDL2*.a" | grep -v image | grep -v ttf | grep -v sound | head -1)
          echo "SDL2 lib: $SDL2_LIB"
          make_xcfw "SDL2" "$SDL2_LIB"

          # ── 10. SDL2_image ─────────────────────────────────────────────────────
          echo ">>> Building SDL2_image"
          curl -fsSL https://github.com/libsdl-org/SDL_image/releases/download/release-2.8.2/SDL2_image-2.8.2.tar.gz | tar xz
          cmake -S SDL2_image-2.8.2 -B SDL2_image-build \
            $CMAKE_IOS \
            -DCMAKE_PREFIX_PATH="$DEPS_DIR" \
            -DSDL2IMAGE_SAMPLES=OFF \
            -DSDL2IMAGE_TESTS=OFF \
            -DSDL2IMAGE_VENDORED=ON
          cmake --build SDL2_image-build --parallel $NCPU
          cmake --install SDL2_image-build
          make_xcfw "SDL2_image" "$DEPS_DIR/lib/libSDL2_image.a"

          # ── 11. SDL2_ttf ───────────────────────────────────────────────────────
          echo ">>> Building SDL2_ttf"
          curl -fsSL https://github.com/libsdl-org/SDL_ttf/releases/download/release-2.22.0/SDL2_ttf-2.22.0.tar.gz | tar xz
          cmake -S SDL2_ttf-2.22.0 -B SDL2_ttf-build \
            $CMAKE_IOS \
            -DCMAKE_PREFIX_PATH="$DEPS_DIR" \
            -DSDL2TTF_SAMPLES=OFF \
            -DSDL2TTF_VENDORED=ON
          cmake --build SDL2_ttf-build --parallel $NCPU
          cmake --install SDL2_ttf-build
          make_xcfw "SDL2_ttf" "$DEPS_DIR/lib/libSDL2_ttf.a"

          # ── 12. SDL2_sound ─────────────────────────────────────────────────────
          echo ">>> Building SDL2_sound"
          curl -fsSL https://icculus.org/SDL_sound/downloads/SDL2_sound-2.0.2.tar.gz | tar xz
          cmake -S SDL2_sound-2.0.2 -B SDL2_sound-build \
            $CMAKE_IOS \
            -DCMAKE_PREFIX_PATH="$DEPS_DIR" \
            -DSDLSOUND_BUILD_SHARED=OFF \
            -DSDLSOUND_BUILD_TEST=OFF
          cmake --build SDL2_sound-build --parallel $NCPU
          cmake --install SDL2_sound-build
          make_xcfw "SDL2_sound" "$DEPS_DIR/lib/libSDL2_sound.a"

          # ── 13. Ruby ───────────────────────────────────────────────────────────
          # Ruby MUST use autoconf — it has no CMake build system
          # FIX: build native host ruby first (required for cross-compile codegen)
          # FIX: unset all iOS flags before host build so host ruby compiles for Mac
          # FIX: pass CC/CFLAGS inline not via export so host build isn't polluted
          echo ">>> Building Ruby for iOS"
          curl -fsSL https://cache.ruby-lang.org/pub/ruby/3.1/ruby-3.1.6.tar.gz | tar xz
          cd ruby-3.1.6

          echo "  -> Building host Ruby (native Mac)..."
          mkdir -p build_host && cd build_host
          unset CC CXX CFLAGS CXXFLAGS LDFLAGS
          ../configure \
            --prefix="$BUILD_DIR/ruby_host" \
            --disable-install-doc \
            --without-gmp \
            --disable-rubygems \
            --disable-install-rdoc
          make -j$NCPU install
          cd ..

          echo "  -> Cross-compiling Ruby for iOS arm64..."
          IOS_CC=$(xcrun --sdk iphoneos --find clang)
          IOS_FLAGS="-arch arm64 -isysroot $IOS_SDK -mios-version-min=13.0 -fembed-bitcode-marker"
          mkdir -p build_ios && cd build_ios
          CC="$IOS_CC" \
          CFLAGS="$IOS_FLAGS" \
          LDFLAGS="$IOS_FLAGS" \
          ../configure \
            --host=aarch64-apple-darwin \
            --with-cross-build="$BUILD_DIR/ruby-3.1.6/build_host" \
            --prefix="$DEPS_DIR" \
            --enable-static \
            --disable-shared \
            --disable-install-doc \
            --disable-install-rdoc \
            --without-gmp \
            --disable-rubygems \
            ac_cv_func_fork=no \
            ac_cv_func_system=no \
            ac_cv_func_getentropy=no \
            ac_cv_func_posix_spawn=no
          make -j$NCPU

          # FIX: copy headers and lib to exact paths CMakeLists.txt expects
          RUBY_VER_INC="$DEPS_DIR/include/ruby-3.1.0"
          mkdir -p "$RUBY_VER_INC/aarch64-ios/ruby"
          # Copy main ruby.h and include/ruby/ subfolder
          cp ../include/ruby.h "$RUBY_VER_INC/" 2>/dev/null || true
          cp -r ../include/ruby "$RUBY_VER_INC/" 2>/dev/null || true
          # Copy the arch-specific config.h
          CONFIG_H=$(find . -name "config.h" | grep -v host | head -1)
          [ -n "$CONFIG_H" ] && cp "$CONFIG_H" "$RUBY_VER_INC/aarch64-ios/ruby/config.h"
          # Copy the static lib
          RUBY_A=$(find . -name "libruby-static.a" | head -1)
          [ -z "$RUBY_A" ] && RUBY_A=$(find . -name "libruby.a" | head -1)
          [ -n "$RUBY_A" ] && cp "$RUBY_A" "$DEPS_DIR/lib/device/libruby.a"

          echo ""
          echo ">>> All dependencies built successfully!"
          echo "xcframeworks built:"
          ls "$XCFW_DIR"
          echo "ruby lib:"
          ls -la "$DEPS_DIR/lib/device/"

      - name: Build MKXP-Z
        script: |
          set -e
          IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          DEPS_DIR="$CM_BUILD_DIR/deps/ios_dist"

          cd ios && mkdir -p build && cd build

          cmake .. \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT="$IOS_SDK" \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="13.0" \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DDEPS_DIR="$DEPS_DIR"

          cmake --build . --parallel $(sysctl -n hw.ncpu)

      - name: Package for Sideloading
        script: |
          set -e
          cd ios/build
          mkdir -p Payload
          APP_PATH=$(find . -name "*.app" -type d -maxdepth 3 | head -n 1)
          if [ -n "$APP_PATH" ]; then
            cp -r "$APP_PATH" Payload/
            zip -r mkxp-z-sideload.ipa Payload
            echo "IPA created: mkxp-z-sideload.ipa"
          else
            echo "FATAL ERROR: .app bundle not found!"
            exit 1
          fi

    artifacts:
      - ios/build/*.ipa
