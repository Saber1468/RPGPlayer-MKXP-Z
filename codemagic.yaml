workflows:
  ios-mkxpz:
    name: MKXP-Z iOS Build
    instance_type: mac_mini_m2
    scripts:
      - name: Install Dependencies
        script: |
          brew install sdl2 sdl2_image sdl2_ttf sdl2_sound physfs ruby cmake openal-soft pkg-config uchardet theora libvorbis pixman freetype
      - name: Build MKXP-Z
        script: |
          HB_PREFIX=$(brew --prefix)
          OPENAL_PREFIX=$(brew --prefix openal-soft)
          UCHARDET_PREFIX=$(brew --prefix uchardet)

          # ios/shim/GLES2 provides the gl2platform.h / gl2.h / gl2ext.h
          # headers that Homebrew's SDL2 SDL_opengles2.h tries to include.
          # CMakeLists.txt adds the shim dir automatically; CPATH is the
          # belt-and-suspenders fallback for any stray compiler invocations.
          SHIM_DIR="$(pwd)/ios/shim"

          export CPATH="$SHIM_DIR:$HB_PREFIX/include:$HB_PREFIX/include/SDL2:$OPENAL_PREFIX/include:$OPENAL_PREFIX/include/AL:$UCHARDET_PREFIX/include:$UCHARDET_PREFIX/include/uchardet"
          export LIBRARY_PATH="$HB_PREFIX/lib:$OPENAL_PREFIX/lib:$UCHARDET_PREFIX/lib"

          cd ios && mkdir -p build && cd build

          cmake .. \
            -DAPPLE=1 \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_PREFIX_PATH="$HB_PREFIX;$OPENAL_PREFIX;$UCHARDET_PREFIX"

          make -j$(sysctl -n hw.ncpu)
      - name: Package for Sideloading
        script: |
          cd ios/build
          mkdir -p Payload
          APP_PATH=$(find . -name "*.app" -type d -maxdepth 3 | head -n 1)
          if [ -n "$APP_PATH" ]; then
            cp -r "$APP_PATH" Payload/
            zip -r mkxp-z-sideload.ipa Payload
          else
            echo "FATAL ERROR: .app bundle not found!"
            exit 1
          fi
    artifacts:
      - ios/build/*.ipa
