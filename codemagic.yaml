workflows:
  ios-mkxpz:
    name: MKXP-Z iOS Build
    instance_type: mac_mini_m1
    scripts:
      - name: Install Dependencies
        script: |
          brew install sdl2 sdl2_image sdl2_ttf physfs ruby cmake openal-soft pkg-config
      - name: Build MKXP-Z
        script: |
          cd ios
          mkdir -p build && cd build
          
          # These 3 lines solve the "file not found" errors by pointing to the exact folders
          export CPATH="$(brew --prefix sdl2)/include/SDL2:$(brew --prefix openal-soft)/include:$(brew --prefix physfs)/include"
          export LIBRARY_PATH="$(brew --prefix sdl2)/lib:$(brew --prefix openal-soft)/lib:$(brew --prefix physfs)/lib"
          export CMAKE_PREFIX_PATH="$(brew --prefix):$(brew --prefix sdl2):$(brew --prefix openal-soft)"

          cmake .. -DIOS=1 \
            -DCMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH" \
            -DOPENAL_INCLUDE_DIR="$(brew --prefix openal-soft)/include" \
            -DOPENAL_LIBRARY="$(brew --prefix openal-soft)/lib/libopenal.dylib"
          
          make -j$(sysctl -n hw.ncpu)
    artifacts:
      - ios/build/*.ipa
      - ios/build/*.app
