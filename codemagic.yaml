workflows:
  ios-mkxpz:
    name: MKXP-Z iOS Build
    instance_type: mac_mini_m1
    scripts:
      - name: Install Dependencies
        script: |
          brew install sdl2 sdl2_image sdl2_ttf physfs ruby cmake openal-soft pkg-config uchardet
      - name: Build MKXP-Z
        script: |
          cd ios
          mkdir -p build && cd build
          
          # Fix for SDL2, OpenAL, and Uchardet headers
          export CPATH="$(brew --prefix sdl2)/include/SDL2:$(brew --prefix openal-soft)/include:$(brew --prefix uchardet)/include/uchardet:$(brew --prefix)/include"
          export LIBRARY_PATH="$(brew --prefix sdl2)/lib:$(brew --prefix openal-soft)/lib:$(brew --prefix uchardet)/lib:$(brew --prefix ruby)/lib"
          
          # Explicit Ruby Fix
          export RUBY_PATH=$(brew --prefix ruby)

          cmake .. -DIOS=1 \
            -DCMAKE_PREFIX_PATH="$(brew --prefix):$RUBY_PATH" \
            -DOPENAL_INCLUDE_DIR="$(brew --prefix openal-soft)/include" \
            -DOPENAL_LIBRARY="$(brew --prefix openal-soft)/lib/libopenal.dylib" \
            -DRUBY_EXECUTABLE="$RUBY_PATH/bin/ruby" \
            -DRUBY_INCLUDE_DIR="$RUBY_PATH/include/ruby-3.3.0" \
            -DRUBY_LIBRARY="$RUBY_PATH/lib/libruby.dylib"
          
          make -j$(sysctl -n hw.ncpu)
    artifacts:
      - ios/build/*.ipa
      - ios/build/*.app
