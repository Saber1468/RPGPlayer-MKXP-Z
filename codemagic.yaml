workflows:
  ios-mkxpz:
    name: MKXP-Z iOS Build
    instance_type: mac_mini_m2
    scripts:
      - name: Install Dependencies
        script: |
          brew install sdl2 sdl2_image sdl2_ttf sdl2_sound physfs ruby cmake openal-soft pkg-config uchardet theora libvorbis
      - name: Build MKXP-Z
        script: |
          HB_PREFIX=$(brew --prefix)
          OPENAL_PREFIX=$(brew --prefix openal-soft)
          
          # Force the compiler to find SDL2, OpenAL, and GLES2 headers
          export CPATH="$HB_PREFIX/include:$HB_PREFIX/include/SDL2:$HB_PREFIX/include/SDL2/GLES2:$OPENAL_PREFIX/include:$OPENAL_PREFIX/include/AL"
          
          cd ios && mkdir -p build && cd build
          
          # Single-line command to avoid hidden space errors
          cmake .. -DIOS=1 -DAPPLE=1 -DCMAKE_PREFIX_PATH="$HB_PREFIX;$OPENAL_PREFIX" -DCMAKE_OSX_ARCHITECTURES="arm64"
          
          make -j$(sysctl -n hw.ncpu)
      - name: Package for Sideloading
        script: |
          cd ios/build
          mkdir -p Payload
          APP_PATH=$(find . -name "*.app" -type d -maxdepth 3 | head -n 1)
          if [ -n "$APP_PATH" ]; then
            cp -r "$APP_PATH" Payload/
            zip -r mkxp-z-sideload.ipa Payload
          else
            echo "FATAL ERROR: .app bundle not found!"
            exit 1
          fi
    artifacts:
      - ios/build/*.ipa
