workflows:
  ios-mkxpz:
    name: MKXP-Z iOS Build
    instance_type: mac_mini_m2
    environment:
      vars:
        IOS_DEPS_DIR: $CM_BUILD_DIR/ios/Dependencies/build-iphoneos
    cache:
      cache_paths:
        - $HOME/clone/ios/Dependencies/build-iphoneos
        - $HOME/clone/ios/Dependencies/downloads
    scripts:
      - name: Install Host Build Tools
        script: |
          brew install autoconf automake libtool pkg-config cmake bison nasm meson ninja

      - name: Build iOS Dependencies
        script: |
          cd ios/Dependencies
          make -j$(sysctl -n hw.ncpu) everything

      - name: Build MKXP-Z
        script: |
          set -e
          cd ios && mkdir -p build && cd build

          cmake .. \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DDEPS_DIR="$CM_BUILD_DIR/ios/Dependencies/build-iphoneos"

          make -j$(sysctl -n hw.ncpu)

      - name: Package for Sideloading
        script: |
          set -e
          cd ios/build
          mkdir -p Payload
          APP_PATH=$(find . -name "*.app" -type d -maxdepth 3 | head -n 1)
          if [ -n "$APP_PATH" ]; then
            cp -r "$APP_PATH" Payload/
            zip -r mkxp-z-sideload.ipa Payload
            echo "IPA created successfully: mkxp-z-sideload.ipa"
          else
            echo "NOTE: No .app bundle found."
            echo "The build produced libmkxpz.a (static library)."
            echo "An Xcode app wrapper project is needed to produce an IPA."
            echo "Archiving the static library instead."
            mkdir -p artifacts
            cp libmkxpz.a artifacts/
            ls -la artifacts/
          fi

    artifacts:
      - ios/build/*.ipa
      - ios/build/artifacts/*
