workflows:
  ios-mkxpz:
    name: MKXP-Z iOS Build
    instance_type: mac_mini_m2
    cache:
      cache_paths:
        - $CM_BUILD_DIR/deps/ios_dist
    scripts:
      - name: Install Build Tools
        script: |
          brew install cmake pkg-config nasm

      - name: Build iOS Dependencies
        script: |
          set -e

          IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          MIN_IOS="13.0"
          ARCH="arm64"
          NCPU=$(sysctl -n hw.ncpu)

          DEPS_DIR="$CM_BUILD_DIR/deps/ios_dist"
          XCFW_DIR="$DEPS_DIR/xcframeworks"
          BUILD_DIR="$CM_BUILD_DIR/deps_build"
          TOOLCHAIN="$CM_BUILD_DIR/ios.toolchain.cmake"

          mkdir -p "$DEPS_DIR/include" "$DEPS_DIR/lib/device" "$XCFW_DIR" "$BUILD_DIR"

          if [ -f "$DEPS_DIR/lib/device/libruby.a" ]; then
            echo ">>> Deps already cached, skipping build"
            exit 0
          fi

          printf '%s\n' \
            'set(CMAKE_SYSTEM_NAME iOS)' \
            'set(CMAKE_OSX_ARCHITECTURES "arm64")' \
            'set(CMAKE_OSX_DEPLOYMENT_TARGET "13.0")' \
            'execute_process(COMMAND xcrun --sdk iphoneos --show-sdk-path' \
            '  OUTPUT_VARIABLE CMAKE_OSX_SYSROOT OUTPUT_STRIP_TRAILING_WHITESPACE)' \
            'set(CMAKE_TRY_COMPILE_TARGET_TYPE STATIC_LIBRARY)' \
            > "$TOOLCHAIN"

          CMAKE_IOS="-DCMAKE_TOOLCHAIN_FILE=$TOOLCHAIN -DCMAKE_INSTALL_PREFIX=$DEPS_DIR -DBUILD_SHARED_LIBS=OFF"

          make_xcfw() {
            NAME=$1
            LIB=$2
            XCFW="$XCFW_DIR/${NAME}.xcframework"
            mkdir -p "$XCFW/ios-arm64"
            cp "$LIB" "$XCFW/ios-arm64/${NAME}.a"
            printf '%s\n' \
              '<?xml version="1.0" encoding="UTF-8"?>' \
              '<plist version="1.0"><dict>' \
              '<key>AvailableLibraries</key><array><dict>' \
              '<key>LibraryIdentifier</key><string>ios-arm64</string>' \
              "<key>LibraryPath</key><string>${NAME}.a</string>" \
              '<key>SupportedArchitectures</key><array><string>arm64</string></array>' \
              '<key>SupportedPlatform</key><string>ios</string>' \
              '</dict></array>' \
              '<key>CFBundlePackageType</key><string>XFWK</string>' \
              '<key>XCFrameworkFormatVersion</key><string>1.0</string>' \
              '</dict></plist>' \
              > "$XCFW/Info.plist"
          }

          cd "$BUILD_DIR"

          echo ">>> Building libogg"
          curl -fsSL https://downloads.xiph.org/releases/ogg/libogg-1.3.5.tar.gz | tar xz
          cmake -S libogg-1.3.5 -B libogg-build $CMAKE_IOS
          cmake --build libogg-build --parallel $NCPU
          cmake --install libogg-build
          make_xcfw "ogg" "$DEPS_DIR/lib/libogg.a"

          echo ">>> Building libvorbis"
          curl -fsSL https://downloads.xiph.org/releases/vorbis/libvorbis-1.3.7.tar.gz | tar xz
          cmake -S libvorbis-1.3.7 -B libvorbis-build $CMAKE_IOS \
            -DOGG_INCLUDE_DIR="$DEPS_DIR/include" \
            -DOGG_LIBRARY="$DEPS_DIR/lib/libogg.a"
          cmake --build libvorbis-build --parallel $NCPU
          cmake --install libvorbis-build
          make_xcfw "vorbis"     "$DEPS_DIR/lib/libvorbis.a"
          make_xcfw "vorbisfile" "$DEPS_DIR/lib/libvorbisfile.a"

          echo ">>> Building libtheora"
          curl -fsSL https://downloads.xiph.org/releases/theora/libtheora-1.1.1.tar.gz | tar xz
          mkdir -p theora-cmake
          printf '%s\n' \
            'cmake_minimum_required(VERSION 3.15)' \
            'project(theora C)' \
            'file(GLOB TSRC "../libtheora-1.1.1/lib/*.c")' \
            'list(FILTER TSRC EXCLUDE REGEX "encode")' \
            'add_library(theora STATIC ${TSRC})' \
            'target_include_directories(theora PUBLIC ../libtheora-1.1.1/include)' \
            'target_include_directories(theora PRIVATE ${OGG_INCLUDE_DIR})' \
            'add_library(theoradec STATIC ../libtheora-1.1.1/lib/decapiwrapper.c ../libtheora-1.1.1/lib/dequant.c ../libtheora-1.1.1/lib/fragment.c ../libtheora-1.1.1/lib/idct.c ../libtheora-1.1.1/lib/info.c ../libtheora-1.1.1/lib/internal.c ../libtheora-1.1.1/lib/quant.c ../libtheora-1.1.1/lib/state.c ../libtheora-1.1.1/lib/huffdec.c ../libtheora-1.1.1/lib/decode.c ../libtheora-1.1.1/lib/apiwrapper.c)' \
            'target_include_directories(theoradec PUBLIC ../libtheora-1.1.1/include)' \
            'target_include_directories(theoradec PRIVATE ${OGG_INCLUDE_DIR})' \
            'install(TARGETS theora theoradec ARCHIVE DESTINATION lib)' \
            'install(DIRECTORY ../libtheora-1.1.1/include/theora DESTINATION include)' \
            > theora-cmake/CMakeLists.txt
          cmake -S theora-cmake -B theora-build $CMAKE_IOS \
            -DOGG_INCLUDE_DIR="$DEPS_DIR/include"
          cmake --build theora-build --parallel $NCPU
          cmake --install theora-build
          make_xcfw "theora"    "$DEPS_DIR/lib/libtheora.a"
          make_xcfw "theoradec" "$DEPS_DIR/lib/libtheoradec.a"

          echo ">>> Building uchardet"
          curl -fsSL https://www.freedesktop.org/software/uchardet/releases/uchardet-0.0.8.tar.xz | tar xJ
          cmake -S uchardet-0.0.8 -B uchardet-build $CMAKE_IOS \
            -DBUILD_BINARY=OFF
          cmake --build uchardet-build --parallel $NCPU
          cmake --install uchardet-build
          mkdir -p "$DEPS_DIR/include/uchardet"
          cp uchardet-0.0.8/src/uchardet.h "$DEPS_DIR/include/uchardet/" 2>/dev/null || true
          make_xcfw "uchardet" "$DEPS_DIR/lib/libuchardet.a"

          echo ">>> Building pixman"
          curl -fsSL https://cairographics.org/releases/pixman-0.42.2.tar.gz | tar xz
          mkdir -p pixman-cmake
          printf '%s\n' \
            'cmake_minimum_required(VERSION 3.15)' \
            'project(pixman C)' \
            'file(GLOB SRC "../pixman-0.42.2/pixman/pixman*.c")' \
            'list(FILTER SRC EXCLUDE REGEX "mmx|sse2|vmx|arm-neon|arm-simd|mips|loongson")' \
            'add_library(pixman-1 STATIC ${SRC})' \
            'target_include_directories(pixman-1 PUBLIC ../pixman-0.42.2/pixman)' \
            'target_compile_definitions(pixman-1 PRIVATE PACKAGE="pixman" PACKAGE_VERSION="0.42.2" HAVE_MPROTECT=0 PIXMAN_NO_TLS=1)' \
            'install(TARGETS pixman-1 ARCHIVE DESTINATION lib)' \
            'install(DIRECTORY ../pixman-0.42.2/pixman/ DESTINATION include/pixman-1 FILES_MATCHING PATTERN "pixman.h")' \
            > pixman-cmake/CMakeLists.txt
          cmake -S pixman-cmake -B pixman-build $CMAKE_IOS
          cmake --build pixman-build --parallel $NCPU
          cmake --install pixman-build
          make_xcfw "pixman" "$DEPS_DIR/lib/libpixman-1.a"

          echo ">>> Building PhysFS"
          curl -fsSL https://icculus.org/physfs/downloads/physfs-3.0.2.tar.bz2 | tar xj
          cmake -S physfs-3.0.2 -B physfs-build $CMAKE_IOS \
            -DPHYSFS_BUILD_SHARED=OFF \
            -DPHYSFS_BUILD_TEST=OFF
          cmake --build physfs-build --parallel $NCPU
          cmake --install physfs-build
          make_xcfw "physfs" "$DEPS_DIR/lib/libphysfs.a"

          echo ">>> Building OpenAL-soft"
          curl -fsSL https://github.com/kcat/openal-soft/archive/refs/tags/1.23.1.tar.gz | tar xz
          cmake -S openal-soft-1.23.1 -B openal-build $CMAKE_IOS \
            -DLIBTYPE=STATIC \
            -DALSOFT_UTILS=OFF \
            -DALSOFT_EXAMPLES=OFF \
            -DALSOFT_TESTS=OFF \
            -DALSOFT_BACKEND_COREAUDIO=ON \
            -DALSOFT_BACKEND_WAVE=OFF
          cmake --build openal-build --parallel $NCPU
          cmake --install openal-build
          OPENAL_LIB=$(find "$DEPS_DIR/lib" -name "libopenal*.a" -o -name "libOpenAL*.a" 2>/dev/null | head -1)
          make_xcfw "openal" "$OPENAL_LIB"

          echo ">>> Building sigc++"
          curl -fsSL https://download.gnome.org/sources/libsigc++/2.12/libsigc++-2.12.0.tar.xz | tar xJ
          mkdir -p sigc-cmake
          printf '%s\n' \
            'cmake_minimum_required(VERSION 3.15)' \
            'project(sigc CXX)' \
            'set(CMAKE_CXX_STANDARD 14)' \
            'file(GLOB_RECURSE SRC "../libsigc++-2.12.0/sigc++/*.cc")' \
            'add_library(sigc-2.0 STATIC ${SRC})' \
            'target_include_directories(sigc-2.0 PUBLIC ../libsigc++-2.12.0)' \
            'install(TARGETS sigc-2.0 ARCHIVE DESTINATION lib)' \
            'install(DIRECTORY ../libsigc++-2.12.0/sigc++ DESTINATION include/sigc++-2.0)' \
            > sigc-cmake/CMakeLists.txt
          cmake -S sigc-cmake -B sigc-build $CMAKE_IOS
          cmake --build sigc-build --parallel $NCPU
          cmake --install sigc-build
          make_xcfw "sigc" "$DEPS_DIR/lib/libsigc-2.0.a"

          echo ">>> Building SDL2"
          curl -fsSL https://github.com/libsdl-org/SDL/releases/download/release-2.30.3/SDL2-2.30.3.tar.gz | tar xz
          cmake -S SDL2-2.30.3 -B SDL2-build $CMAKE_IOS \
            -DSDL_STATIC=ON \
            -DSDL_SHARED=OFF \
            -DSDL_TEST=OFF \
            -DSDL_VIDEO_OPENGLES=ON
          cmake --build SDL2-build --parallel $NCPU
          cmake --install SDL2-build
          make_xcfw "SDL2" "$DEPS_DIR/lib/libSDL2.a"

          echo ">>> Building SDL2_image"
          curl -fsSL https://github.com/libsdl-org/SDL_image/releases/download/release-2.8.2/SDL2_image-2.8.2.tar.gz | tar xz
          cmake -S SDL2_image-2.8.2 -B SDL2_image-build $CMAKE_IOS \
            -DCMAKE_PREFIX_PATH="$DEPS_DIR" \
            -DSDL2IMAGE_SAMPLES=OFF \
            -DSDL2IMAGE_TESTS=OFF
          cmake --build SDL2_image-build --parallel $NCPU
          cmake --install SDL2_image-build
          make_xcfw "SDL2_image" "$DEPS_DIR/lib/libSDL2_image.a"

          echo ">>> Building SDL2_ttf"
          curl -fsSL https://github.com/libsdl-org/SDL_ttf/releases/download/release-2.22.0/SDL2_ttf-2.22.0.tar.gz | tar xz
          cmake -S SDL2_ttf-2.22.0 -B SDL2_ttf-build $CMAKE_IOS \
            -DCMAKE_PREFIX_PATH="$DEPS_DIR" \
            -DSDL2TTF_SAMPLES=OFF
          cmake --build SDL2_ttf-build --parallel $NCPU
          cmake --install SDL2_ttf-build
          make_xcfw "SDL2_ttf" "$DEPS_DIR/lib/libSDL2_ttf.a"

          echo ">>> Building SDL2_sound"
          curl -fsSL https://icculus.org/SDL_sound/downloads/SDL2_sound-2.0.2.tar.gz | tar xz
          cmake -S SDL2_sound-2.0.2 -B SDL2_sound-build $CMAKE_IOS \
            -DCMAKE_PREFIX_PATH="$DEPS_DIR" \
            -DSDLSOUND_BUILD_SHARED=OFF \
            -DSDLSOUND_BUILD_TEST=OFF
          cmake --build SDL2_sound-build --parallel $NCPU
          cmake --install SDL2_sound-build
          make_xcfw "SDL2_sound" "$DEPS_DIR/lib/libSDL2_sound.a"

          echo ">>> Building Ruby for iOS"
          curl -fsSL https://cache.ruby-lang.org/pub/ruby/3.1/ruby-3.1.6.tar.gz | tar xz
          cd ruby-3.1.6

          mkdir -p build_host && cd build_host
          ../configure --prefix="$BUILD_DIR/ruby_host" \
            --disable-install-doc --without-gmp --disable-rubygems
          make -j$NCPU install
          cd ..

          mkdir -p build_ios && cd build_ios
          IOS_CC=$(xcrun --sdk iphoneos --find clang)
          IOS_FLAGS="-arch arm64 -isysroot $IOS_SDK -mios-version-min=13.0"
          CC="$IOS_CC" CFLAGS="$IOS_FLAGS" LDFLAGS="$IOS_FLAGS" \
          ../configure \
            --host=aarch64-apple-darwin \
            --with-cross-build="$BUILD_DIR/ruby-3.1.6/build_host" \
            --prefix="$DEPS_DIR" \
            --enable-static --disable-shared \
            --disable-install-doc \
            --without-gmp \
            --disable-rubygems \
            ac_cv_func_fork=no \
            ac_cv_func_system=no \
            ac_cv_func_getentropy=no
          make -j$NCPU

          RUBY_VER_INC="$DEPS_DIR/include/ruby-3.1.0"
          mkdir -p "$RUBY_VER_INC/aarch64-ios/ruby"
          cp -r ../include/ruby.h ../include/ruby "$RUBY_VER_INC/" 2>/dev/null || true
          find . -name "config.h" | head -1 | xargs -I{} cp {} "$RUBY_VER_INC/aarch64-ios/ruby/config.h" 2>/dev/null || true
          find . -name "libruby-static.a" -exec cp {} "$DEPS_DIR/lib/device/libruby.a" \; 2>/dev/null || \
          find . -name "libruby.a" -exec cp {} "$DEPS_DIR/lib/device/libruby.a" \; 2>/dev/null || true

          echo ">>> All dependencies built!"
          ls "$XCFW_DIR"
          ls "$DEPS_DIR/lib/device/"

      - name: Build MKXP-Z
        script: |
          set -e
          IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          DEPS_DIR="$CM_BUILD_DIR/deps/ios_dist"

          cd ios && mkdir -p build && cd build

          cmake .. \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT="$IOS_SDK" \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="13.0" \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DDEPS_DIR="$DEPS_DIR"

          cmake --build . --parallel $(sysctl -n hw.ncpu)

      - name: Package for Sideloading
        script: |
          set -e
          cd ios/build
          mkdir -p Payload
          APP_PATH=$(find . -name "*.app" -type d -maxdepth 3 | head -n 1)
          if [ -n "$APP_PATH" ]; then
            cp -r "$APP_PATH" Payload/
            zip -r mkxp-z-sideload.ipa Payload
            echo "IPA created: mkxp-z-sideload.ipa"
          else
            echo "FATAL ERROR: .app bundle not found!"
            exit 1
          fi

    artifacts:
      - ios/build/*.ipa
