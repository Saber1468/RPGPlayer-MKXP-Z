workflows:
  ios-mkxpz:
    name: MKXP-Z iOS Build
    instance_type: mac_mini_m2
    scripts:
      - name: Install Host Tools
        script: |
          brew install cmake pkg-config ruby
      - name: Build MKXP-Z
        script: |
          cd ios && mkdir -p build && cd build
          
          # Clean CMake config specifically for iOS, letting the repo use its own deps
          cmake .. -DIOS=1 -DAPPLE=1 -DCMAKE_OSX_ARCHITECTURES="arm64"
          
          make -j$(sysctl -n hw.ncpu)
      - name: Package for Sideloading
        script: |
          cd ios/build
          mkdir -p Payload
          APP_PATH=$(find . -name "*.app" -type d -maxdepth 3 | head -n 1)
          if [ -n "$APP_PATH" ]; then
            cp -r "$APP_PATH" Payload/
            zip -r mkxp-z-sideload.ipa Payload
          else
            echo "FATAL ERROR: .app bundle not found!"
            exit 1
          fi
    artifacts:
      - ios/build/*.ipa
